<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Tùng Photobooth | Lễ Hội Đền Đô PRO</title>
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME
           ========================================================================== */
        :root {
            /* Colors - Bản in */
            --print-bg: #E8D8B8;
            --print-text: #3b2b1f;
            --print-red: #A82C2D;
            --print-gold: #E6C229;
            --print-green: #2A402D;
            
            /* Colors - UI App */
            --app-bg: #0f172a;
            --app-surface: rgba(30, 41, 59, 0.7);
            --app-primary: #ef4444;
            --app-primary-hover: #dc2626;
            --app-accent: #fbbf24;
            --app-text: #f8fafc;
            --app-text-muted: #94a3b8;
            
            /* Typography */
            --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-print: 'Georgia', 'Times New Roman', serif;
            
            /* Effects */
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================================================
           2. RESET & BASE
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-ui);
            background-color: var(--app-bg);
            color: var(--app-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas Background Effect */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================================================
           3. LAYOUT COMPONENTS
           ========================================================================== */
        .app-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--app-accent), #fef08a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(251, 191, 36, 0.2);
        }

        .header p {
            color: var(--app-text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            background: var(--app-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }

        /* ==========================================================================
           4. SCREENS & VIEWS
           ========================================================================== */
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; animation: fadeIn 0.5s ease-out; }

        /* Camera Screen */
        .viewfinder-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(251, 191, 36, 0.3);
            margin-bottom: 2rem;
        }

        #videoElement {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Gương */
            transition: opacity 0.3s;
        }

        .grid-overlay {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 33.33% 33.33%;
            pointer-events: none;
            z-index: 2;
        }

        #countdownDisplay {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            font-size: 8rem; font-weight: 900; color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }

        /* Processing Screen */
        .processing-wrapper {
            padding: 4rem 0;
            text-align: center;
        }
        
        .loader-ring {
            width: 80px; height: 80px;
            border: 4px solid rgba(251, 191, 36, 0.1);
            border-left-color: var(--app-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem auto;
        }

        /* Result Screen */
        .result-mockup {
            width: 100%; max-width: 500px;
            background: #fff; padding: 12px;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
            margin-bottom: 2rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .result-mockup:hover { transform: translateY(-10px) scale(1.02); }

        #finalCanvas {
            width: 100%; height: auto; display: block;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* ==========================================================================
           5. UI CONTROLS & MODULES
           ========================================================================== */
        .status-indicators {
            display: flex; gap: 1rem; margin-bottom: 1.5rem;
        }
        
        .indicator-dot {
            width: 16px; height: 16px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            transition: var(--transition-smooth);
        }
        .indicator-dot.active {
            background: var(--app-primary);
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 15px var(--app-primary);
            transform: scale(1.2);
        }

        .controls-group {
            display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: 100%;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none; border-radius: 50px;
            cursor: pointer;
            display: flex; align-items: center; gap: 0.75rem;
            transition: var(--transition-smooth);
            text-transform: uppercase; letter-spacing: 1px;
            font-family: inherit;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn svg { width: 24px; height: 24px; }

        .btn-primary {
            background: var(--app-primary); color: white;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--app-primary-hover); transform: translateY(-3px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,255,255,0.2); transform: translateY(-2px);
        }

        .btn-accent {
            background: var(--app-accent); color: #000;
            box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3);
        }
        .btn-accent:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8); color: white; padding: 1rem 2rem;
            border-radius: 50px; backdrop-filter: blur(10px);
            font-weight: 500; opacity: 0; transition: var(--transition-smooth);
            z-index: 100; border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ==========================================================================
           6. ANIMATIONS
           ========================================================================== */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .flash-effect {
            position: absolute; inset: 0; background: white; z-index: 50;
            animation: flash 0.5s ease-out forwards; pointer-events: none;
        }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .main-container { padding: 1rem; border-radius: 16px; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Cinematic Particle Background -->
    <canvas id="bgCanvas"></canvas>

    <!-- Toast Notification System -->
    <div id="toast" class="toast">Thông báo</div>

    <div class="app-wrapper">
        <header class="header">
            <h1>Đăng Tùng Photobooth</h1>
            <p>Di tích Quốc gia đặc biệt Lễ Hội Đền Đô</p>
        </header>

        <main class="main-container">
            
            <!-- SCREEN 1: CAMERA CAPTURE -->
            <section id="screenCamera" class="screen active">
                <div class="status-indicators">
                    <div class="indicator-dot" id="dot1"></div>
                    <div class="indicator-dot" id="dot2"></div>
                    <div class="indicator-dot" id="dot3"></div>
                </div>

                <div class="viewfinder-wrapper" id="viewfinder">
                    <video id="videoElement" autoplay playsinline></video>
                    <div class="grid-overlay"></div>
                    <div id="countdownDisplay">3</div>
                </div>

                <div class="controls-group">
                    <button id="btnSwitchCam" class="btn btn-secondary" title="Đổi Camera">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </button>
                    <button id="btnCapture" class="btn btn-primary" style="flex: 1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                        Khởi động Camera
                    </button>
                </div>
            </section>

            <!-- SCREEN 2: PROCESSING -->
            <section id="screenProcessing" class="screen">
                <div class="processing-wrapper">
                    <div class="loader-ring"></div>
                    <h2 style="color: var(--app-accent); margin-bottom: 1rem;">Đang xử lý bản in...</h2>
                    <p style="color: var(--app-text-muted);">Áp dụng thuật toán cân bằng màu & Layout báo chí</p>
                </div>
            </section>

            <!-- SCREEN 3: RESULT -->
            <section id="screenResult" class="screen">
                <div class="result-mockup">
                    <canvas id="finalCanvas"></canvas>
                </div>
                
                <div class="controls-group">
                    <button id="btnRetake" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        Chụp Lại
                    </button>
                    <button id="btnDownload" class="btn btn-accent">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Tải Bản In Xuất Sắc
                    </button>
                </div>
            </section>

        </main>
    </div>

    <!-- CÁC LOGIC CHÍNH BÊN TRONG -->
    <script>
        /**
         * ĐĂNG TÙNG PHOTOBOOTH - CORE LOGIC
         * Architecture: 
         * 1. AudioEngine (Synthesize sound)
         * 2. UIEngine (Toast, Screen management)
         * 3. CameraManager (Stream, constraints, capture)
         * 4. GraphicsEngine (Canvas drawing, layout algorithms)
         * 5. AppController (Event binding, state management)
         */

        // ==========================================
        // 0. CONFIGURATION & STATE
        // ==========================================
        const CONFIG = {
            maxPhotos: 3,
            countdownSeconds: 3,
            canvasW: 900,
            canvasH: 1200,
            textDark: "#4A3525",
            paperBg1: "#E8D8B8",
            paperBg2: "#D6C098",
            red: "#A82C2D",
            gold: "#E6C229",
            green: "#2A402D",
            fontNews: "'Georgia', 'Times New Roman', serif"
        };

        const STATE = {
            photos: [], // Array of canvas elements
            currentFacingMode: "user",
            stream: null,
            isCapturing: false
        };

        // DOM Elements
        const DOM = {
            screens: {
                camera: document.getElementById('screenCamera'),
                processing: document.getElementById('screenProcessing'),
                result: document.getElementById('screenResult')
            },
            video: document.getElementById('videoElement'),
            viewfinder: document.getElementById('viewfinder'),
            countdown: document.getElementById('countdownDisplay'),
            dots: [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')],
            finalCanvas: document.getElementById('finalCanvas'),
            btns: {
                capture: document.getElementById('btnCapture'),
                switchCam: document.getElementById('btnSwitchCam'),
                retake: document.getElementById('btnRetake'),
                download: document.getElementById('btnDownload')
            },
            toast: document.getElementById('toast')
        };

        // ==========================================
        // 1. AUDIO ENGINE (Web Audio API)
        // Tạo âm thanh không cần file ngoài
        // ==========================================
        const AudioEngine = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            playTone: function(frequency, duration, type = 'sine') {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(frequency, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playBeep: () => AudioEngine.playTone(880, 0.1, 'sine'), // Note A5
            playShutter: () => {
                AudioEngine.playTone(150, 0.05, 'square');
                setTimeout(() => AudioEngine.playTone(100, 0.1, 'sawtooth'), 50);
            }
        };

        // ==========================================
        // 2. UI ENGINE
        // ==========================================
        const UIEngine = {
            showScreen: (screenName) => {
                Object.values(DOM.screens).forEach(s => s.classList.remove('active'));
                DOM.screens[screenName].classList.add('active');
            },
            showToast: (msg, duration = 3000) => {
                DOM.toast.innerText = msg;
                DOM.toast.classList.add('show');
                setTimeout(() => DOM.toast.classList.remove('show'), duration);
            },
            updateDots: () => {
                DOM.dots.forEach((dot, idx) => {
                    idx < STATE.photos.length ? dot.classList.add('active') : dot.classList.remove('active');
                });
            },
            flashEffect: () => {
                const flash = document.createElement('div');
                flash.className = 'flash-effect';
                DOM.viewfinder.appendChild(flash);
                setTimeout(() => flash.remove(), 600);
            }
        };

        // ==========================================
        // 3. BACKGROUND EFFECTS (Cinematic Particles)
        // Tạo hiệu ứng không gian mờ ảo
        // ==========================================
        const BackgroundFX = {
            canvas: document.getElementById('bgCanvas'),
            ctx: null,
            particles: [],
            init: function() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                for(let i=0; i<50; i++) this.particles.push(this.createParticle());
                this.animate();
            },
            resize: function() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },
            createParticle: function() {
                return {
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 2 + 0.5,
                    speedX: Math.random() * 0.5 - 0.25,
                    speedY: Math.random() * -0.5 - 0.1, // Nổi lên trên
                    opacity: Math.random() * 0.5 + 0.1
                };
            },
            animate: function() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particles.forEach(p => {
                    p.x += p.speedX; p.y += p.speedY;
                    if(p.y < 0) { p.y = this.canvas.height; p.x = Math.random() * this.canvas.width; }
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(251, 191, 36, ${p.opacity})`;
                    this.ctx.fill();
                });
                requestAnimationFrame(() => this.animate());
            }
        };

        // ==========================================
        // 4. CAMERA MANAGER
        // ==========================================
        const CameraManager = {
            init: async function() {
                DOM.btns.capture.disabled = true;
                if (STATE.stream) {
                    STATE.stream.getTracks().forEach(track => track.stop());
                }
                
                try {
                    const constraints = {
                        video: { 
                            width: { ideal: 1920 }, 
                            height: { ideal: 1080 },
                            facingMode: STATE.currentFacingMode 
                        },
                        audio: false
                    };
                    
                    STATE.stream = await navigator.mediaDevices.getUserMedia(constraints);
                    DOM.video.srcObject = STATE.stream;
                    
                    // Xử lý hiệu ứng lật gương
                    DOM.video.style.transform = STATE.currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                    
                    DOM.video.onloadedmetadata = () => {
                        DOM.btns.capture.disabled = false;
                        this.updateCaptureButtonText();
                        UIEngine.showToast("Camera đã sẵn sàng!");
                    };
                } catch (err) {
                    console.error("Camera Error:", err);
                    UIEngine.showToast("Không thể truy cập Camera. Kiểm tra quyền trình duyệt!");
                }
            },
            toggleCamera: function() {
                STATE.currentFacingMode = STATE.currentFacingMode === "user" ? "environment" : "user";
                this.init();
            },
            updateCaptureButtonText: function() {
                const icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>`;
                const num = STATE.photos.length;
                DOM.btns.capture.innerHTML = num === 0 ? `${icon} Chụp Ảnh (1/3)` : `${icon} Chụp Tiếp (${num + 1}/3)`;
            },
            captureFrame: function() {
                const tempCanvas = document.createElement('canvas');
                // Tỷ lệ chuẩn photobooth là 4:3
                const targetRatio = 4/3;
                const vW = DOM.video.videoWidth;
                const vH = DOM.video.videoHeight;
                const vRatio = vW / vH;
                
                let sx = 0, sy = 0, sWidth = vW, sHeight = vH;

                if (vRatio > targetRatio) {
                    sWidth = sHeight * targetRatio;
                    sx = (vW - sWidth) / 2;
                } else if (vRatio < targetRatio) {
                    sHeight = sWidth / targetRatio;
                    sy = (vH - sHeight) / 2;
                }

                // Render độ phân giải cao cho bản in
                tempCanvas.width = 1200; 
                tempCanvas.height = 900;
                const tempCtx = tempCanvas.getContext('2d');
                
                // Lật gương ảnh chụp nếu là cam trước
                if (STATE.currentFacingMode === 'user') {
                    tempCtx.translate(tempCanvas.width, 0);
                    tempCtx.scale(-1, 1);
                }
                
                tempCtx.drawImage(DOM.video, sx, sy, sWidth, sHeight, 0, 0, tempCanvas.width, tempCanvas.height);
                return tempCanvas;
            }
        };

        // ==========================================
        // 5. GRAPHICS ENGINE (The core renderer)
        // Tạo layout báo chí cổ điển Đền Đô
        // ==========================================
        const GraphicsEngine = {
            ctx: DOM.finalCanvas.getContext('2d'),
            
            // Hàm tiện ích bọc text
            wrapText: function(text, x, y, maxWidth, lineHeight) {
                let words = text.split(' '), line = '';
                for(let n = 0; n < words.length; n++) {
                    let testLine = line + words[n] + ' ';
                    let metrics = this.ctx.measureText(testLine);
                    if (metrics.width > maxWidth && n > 0) {
                        this.ctx.fillText(line, x, y);
                        line = words[n] + ' '; y += lineHeight;
                    } else { line = testLine; }
                }
                this.ctx.fillText(line, x, y);
            },
            
            drawStar: function(cx, cy, r, color) {
                this.ctx.beginPath(); this.ctx.moveTo(cx, cy - r);
                for (let i = 0; i < 5; i++) {
                    this.ctx.lineTo(cx + Math.cos(Math.PI/2*3 + Math.PI/5 * (2*i)) * r, cy + Math.sin(Math.PI/2*3 + Math.PI/5 * (2*i)) * r);
                    this.ctx.lineTo(cx + Math.cos(Math.PI/2*3 + Math.PI/5 * (2*i+1)) * (r/2.2), cy + Math.sin(Math.PI/2*3 + Math.PI/5 * (2*i+1)) * (r/2.2));
                }
                this.ctx.closePath(); this.ctx.fillStyle = color; this.ctx.fill();
            },

            drawVectorTemple: function(cx, cy) {
                const ctx = this.ctx; ctx.fillStyle = CONFIG.textDark;
                // Đế
                ctx.fillRect(cx-60, cy, 120, 10); 
                // Cột
                ctx.fillRect(cx-45, cy-35, 10, 35); ctx.fillRect(cx+35, cy-35, 10, 35); ctx.fillRect(cx-10, cy-35, 20, 35);
                // Mái dưới
                ctx.beginPath(); ctx.moveTo(cx-75, cy-35); ctx.lineTo(cx+75, cy-35); ctx.lineTo(cx+50, cy-55); ctx.lineTo(cx-50, cy-55); ctx.fill();
                // Tầng 2
                ctx.fillRect(cx-20, cy-75, 40, 20);
                // Mái trên
                ctx.beginPath(); ctx.moveTo(cx-45, cy-75); ctx.lineTo(cx+45, cy-75); ctx.lineTo(cx+25, cy-95); ctx.lineTo(cx-25, cy-95); ctx.fill();
                // Râu rồng nghệ thuật
                ctx.lineWidth = 2; ctx.strokeStyle = CONFIG.textDark;
                ctx.beginPath(); ctx.arc(cx-75, cy-45, 12, 0.5*Math.PI, 1.5*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx+75, cy-45, 12, 1.5*Math.PI, 0.5*Math.PI); ctx.stroke();
            },

            drawFakeQR: function(x, y, size) {
                const ctx = this.ctx; ctx.fillStyle = "#fff"; ctx.fillRect(x, y, size, size);
                ctx.fillStyle = "#000"; let cs = size * 0.22;
                // 3 Anchor squares
                [ [x+2, y+2], [x+size-cs-2, y+2], [x+2, y+size-cs-2] ].forEach(p => {
                    ctx.fillRect(p[0], p[1], cs, cs);
                    ctx.fillStyle = "#fff"; ctx.fillRect(p[0]+3, p[1]+3, cs-6, cs-6);
                    ctx.fillStyle = "#000"; ctx.fillRect(p[0]+6, p[1]+6, cs-12, cs-12);
                });
                // Random modules cho giống QR thật
                for(let i=0; i<100; i++) ctx.fillRect(x + 8 + Math.random()*(size-16), y + 8 + Math.random()*(size-16), 4, 4);
            },

            renderPoster: function() {
                const ctx = this.ctx;
                const { canvasW: w, canvasH: h, textDark, red, gold, green, fontNews } = CONFIG;
                
                // 1. Background Craft Paper
                const bgGradient = ctx.createLinearGradient(0, 0, w, h);
                bgGradient.addColorStop(0, CONFIG.paperBg1);
                bgGradient.addColorStop(1, CONFIG.paperBg2);
                ctx.fillStyle = bgGradient;
                ctx.fillRect(0, 0, w, h);
                
                // 2. Viền mỏng toàn trang
                ctx.strokeStyle = textDark; ctx.lineWidth = 1;
                ctx.strokeRect(20, 20, w - 40, h - 40);

                // ================== HEADER ==================
                // Logo Đăng Tùng bo góc
                ctx.beginPath(); ctx.roundRect(40, 40, 160, 65, 15); ctx.stroke();
                ctx.fillStyle = textDark; ctx.font = `bold 20px ${fontNews}`; ctx.textAlign = "center";
                ctx.fillText("Đăng Tùng", 120, 68); 
                ctx.font = `italic 18px ${fontNews}`;
                ctx.fillText("Photobooth", 120, 92);
                
                // Title lớn
                ctx.fillStyle = red; ctx.font = `bold 68px ${fontNews}`; ctx.textAlign = "left";
                ctx.fillText("LỄ HỘI ĐỀN ĐÔ", 240, 98);
                
                // Kẻ phân cách Header
                ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(40, 130); ctx.lineTo(860, 130); ctx.stroke(); ctx.setLineDash([]);

                // ================== ẢNH CHÍNH (MAIN PHOTO) ==================
                ctx.fillStyle = textDark; ctx.fillRect(38, 148, 484, 364); 
                ctx.drawImage(STATE.photos[0], 40, 150, 480, 360);

                // ================== CỘT BẢN TIN BÊN PHẢI ==================
                ctx.strokeStyle = textDark; ctx.lineWidth = 1;
                ctx.strokeRect(540, 150, 320, 560); 
                ctx.strokeRect(545, 155, 310, 550); // Viền kép báo chí
                
                // Tiêu đề Bản tin
                ctx.fillStyle = green; ctx.font = `bold 42px ${fontNews}`; ctx.textAlign = "left";
                ctx.fillText("BẢN TIN", 565, 208);
                
                // Cờ đỏ sao vàng nhỏ
                ctx.fillStyle = red; ctx.fillRect(740, 175, 50, 35);
                this.drawStar(765, 192.5, 9, gold);

                // Text Lịch sử
                ctx.fillStyle = textDark; ctx.font = `17px ${fontNews}`; ctx.textAlign = "left";
                const newsText = "Đền Đô hay còn gọi là (Đền Lý Bát Đế, Cổ Pháp Điện) được xây dựng vào thế kỷ XI, ngày nay nằm ở phường Đình Bảng, thành phố Từ Sơn. Đền được dựng trên nền đất mà khi xưa vua Lý Công Uẩn đăng quang và trở lại thăm quê hương. Theo sử sách, dân làng Đình Bảng đã cho xây dựng một ngôi nhà lớn làm nơi nghênh tiếp nhà vua. Khi vua Lý Công Uẩn băng hà, Lý Thái Tông lên ngôi kế vị vua cha, ông đã cho sửa sang lại ngôi nhà xưa và chọn làm nơi thờ tự vua cha, từ đó Đền trở thành nơi thờ tự các vị vua nhà Lý sau khi băng hà. Nhắc đến Bắc Ninh, người ta thường nghĩ đến những làn điệu Quan họ ngọt ngào, những làng nghề truyền thống văn hóa.";
                this.wrapText(newsText, 565, 245, 275, 26);
                
                // Vector Đền cuối cột
                this.drawVectorTemple(700, 680);

                // ================== BANNER GIỮA (TỰ HÀO LÀ NGƯỜI VN) ==================
                ctx.fillStyle = textDark; ctx.font = `italic 16px ${fontNews}`; ctx.textAlign = "center";
                ctx.fillText("———— THIẾT KẾ BỞI ĐĂNG TÙNG PHOTOBOOTH ————", 280, 535);
                
                ctx.strokeRect(40, 550, 480, 110);
                
                // Dải cờ trái
                ctx.fillStyle = red; ctx.fillRect(45, 555, 60, 100);
                this.drawStar(75, 580, 12, gold); 
                this.drawStar(75, 630, 12, gold);
                ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.moveTo(55, 605); ctx.lineTo(95, 605); ctx.stroke(); ctx.setLineDash([]);
                
                // Text Tự hào
                ctx.fillStyle = red; ctx.font = `bold 34px ${fontNews}`;
                ctx.fillText("TỰ HÀO LÀ NGƯỜI", 300, 595); 
                ctx.fillText("VIỆT NAM", 300, 640);

                // ================== HAI ẢNH NHỎ DƯỚI ==================
                ctx.fillStyle = textDark; 
                ctx.fillRect(38, 738, 404, 304); ctx.drawImage(STATE.photos[1], 40, 740, 400, 300);
                ctx.fillRect(458, 738, 404, 304); ctx.drawImage(STATE.photos[2], 460, 740, 400, 300);

                // ================== FOOTER & QR ==================
                ctx.fillStyle = textDark; ctx.font = `bold 26px ${fontNews}`; ctx.textAlign = "center";
                ctx.fillText("Chào Mừng Đến Với Lễ Hội Đền Đô - Bắc Ninh", w / 2, 1120);
                
                this.drawFakeQR(w - 110, 1070, 70);
            }
        };

        // ==========================================
        // 6. APPLICATION CONTROLLER
        // ==========================================
        const App = {
            init: function() {
                BackgroundFX.init();
                CameraManager.init();
                this.bindEvents();
            },
            
            bindEvents: function() {
                DOM.btns.switchCam.addEventListener('click', () => CameraManager.toggleCamera());
                
                DOM.btns.capture.addEventListener('click', () => {
                    if (STATE.isCapturing) return;
                    this.startCaptureSequence();
                });

                DOM.btns.retake.addEventListener('click', () => {
                    STATE.photos = [];
                    UIEngine.updateDots();
                    CameraManager.updateCaptureButtonText();
                    UIEngine.showScreen('camera');
                });

                DOM.btns.download.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = `Dang-Tung-Photobooth-${new Date().getTime()}.png`;
                    link.href = DOM.finalCanvas.toDataURL('image/png', 1.0); // Xuất chất lượng gốc
                    link.click();
                    UIEngine.showToast("Đã tải bản in thành công!");
                });
            },

            startCaptureSequence: function() {
                STATE.isCapturing = true;
                DOM.btns.capture.disabled = true;
                DOM.btns.switchCam.disabled = true;
                
                let counter = CONFIG.countdownSeconds;
                DOM.countdown.style.opacity = '1';
                DOM.countdown.innerText = counter;
                AudioEngine.playBeep();

                const timer = setInterval(() => {
                    counter--;
                    if (counter > 0) {
                        DOM.countdown.innerText = counter;
                        AudioEngine.playBeep();
                    } else {
                        clearInterval(timer);
                        DOM.countdown.style.opacity = '0';
                        this.takeSnapshot();
                    }
                }, 1000);
            },

            takeSnapshot: function() {
                AudioEngine.playShutter();
                UIEngine.flashEffect();
                
                const canvas = CameraManager.captureFrame();
                STATE.photos.push(canvas);
                UIEngine.updateDots();
                
                if (STATE.photos.length < CONFIG.maxPhotos) {
                    STATE.isCapturing = false;
                    DOM.btns.capture.disabled = false;
                    DOM.btns.switchCam.disabled = false;
                    CameraManager.updateCaptureButtonText();
                    UIEngine.showToast(`Đã chụp ${STATE.photos.length}/${CONFIG.maxPhotos}. Đổi dáng nào!`, 2000);
                } else {
                    this.processResult();
                }
            },

            processResult: function() {
                // Future Implementation: Upload to Firebase Storage here.
                UIEngine.showScreen('processing');
                
                // Giả lập thời gian xử lý thuật toán ảnh để UX tốt hơn (1.5s)
                setTimeout(() => {
                    GraphicsEngine.renderPoster();
                    UIEngine.showScreen('result');
                    STATE.isCapturing = false;
                    DOM.btns.switchCam.disabled = false;
                    UIEngine.showToast("Bản in đã hoàn thiện!");
                }, 1500);
            }
        };

        // Bootstrap App
        window.addEventListener('load', () => App.init());

    </script>
</body>
</html>
