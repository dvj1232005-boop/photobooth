<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Tùng Photobooth | Lễ Hội Đền Đô - Professional Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME CONFIGURATION
           ========================================================================== */
        :root {
            /* Theme Ứng dụng */
            --app-bg: #090e17;
            --app-surface: rgba(15, 23, 42, 0.75);
            --app-surface-hover: rgba(30, 41, 59, 0.85);
            --app-primary: #dc2626;
            --app-primary-hover: #b91c1c;
            --app-accent: #f59e0b;
            --app-text: #f8fafc;
            --app-text-muted: #94a3b8;
            --app-border: rgba(255, 255, 255, 0.1);
            
            /* Theme Bản In (Màu sắc báo cổ/giấy craft) */
            --print-paper: #F8F4E6; /* Giấy kem sáng dễ đọc */
            --print-ink: #2C1E16;   /* Mực nâu đen, tương phản cao */
            --print-red: #9B1C1C;   /* Đỏ đô trầm ấm */
            --print-gold: #B48600;  /* Vàng kim loại */
            
            /* Typography */
            --font-ui: 'Montserrat', sans-serif;
            --font-print: 'Cormorant Garamond', serif;
            
            /* Layout & Effects */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 8px;
            --shadow-glass: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================================================
           2. GLOBAL RESET
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-ui);
            background-color: var(--app-bg);
            color: var(--app-text);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; position: relative;
        }

        #particleCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.6;
        }

        /* ==========================================================================
           3. UI COMPONENTS & LAYOUT
           ========================================================================== */
        .navbar {
            width: 100%; padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(9, 14, 23, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--app-border); z-index: 50;
        }

        .brand {
            display: flex; align-items: center; gap: 1rem;
        }
        .brand h1 {
            font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            background: linear-gradient(to right, var(--app-accent), #fef08a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-subtitle { font-size: 0.85rem; color: var(--app-text-muted); font-weight: 500; }

        .nav-links { display: flex; gap: 1rem; }
        .nav-btn {
            background: transparent; color: var(--app-text-muted); border: none;
            padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-weight: 600;
            cursor: pointer; transition: var(--transition); font-family: var(--font-ui);
        }
        .nav-btn.active { color: var(--app-accent); background: rgba(245, 158, 11, 0.1); }
        .nav-btn:hover:not(.active) { color: var(--app-text); background: rgba(255,255,255,0.05); }

        .main-container {
            width: 100%; max-width: 1000px; padding: 2rem 1rem;
            display: flex; flex-direction: column; align-items: center; flex: 1;
        }

        .tab-content { display: none; width: 100%; animation: fadeUp 0.5s ease-out; }
        .tab-content.active { display: flex; flex-direction: column; align-items: center; }

        /* ==========================================================================
           4. CAMERA APP SECTION
           ========================================================================== */
        .app-panel {
            width: 100%; max-width: 760px;
            background: var(--app-surface); backdrop-filter: blur(20px);
            border: 1px solid var(--app-border); border-radius: var(--radius-lg);
            padding: 2rem; box-shadow: var(--shadow-glass); display: flex; flex-direction: column; gap: 1.5rem;
        }

        .status-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .photo-indicators { display: flex; gap: 0.75rem; }
        .dot {
            width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 2px solid transparent; transition: var(--transition);
        }
        .dot.active { background: var(--app-primary); border-color: rgba(220, 38, 38, 0.4); box-shadow: 0 0 10px var(--app-primary); transform: scale(1.3); }

        .viewfinder-container {
            position: relative; width: 100%; aspect-ratio: 4/3; background: #000;
            border-radius: var(--radius-md); overflow: hidden;
            border: 2px solid rgba(245, 158, 11, 0.3); box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        
        #videoElement {
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
            transition: filter 0.3s;
        }

        .grid-lines {
            position: absolute; inset: 0; pointer-events: none; z-index: 2;
            background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px);
            background-size: 33.33% 33.33%;
        }

        .countdown-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 10;
            color: white; font-size: 8rem; font-weight: 800; text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .flash-effect {
            position: absolute; inset: 0; background: #fff; z-index: 20; opacity: 0; pointer-events: none;
        }

        .controls-panel {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 100%;
        }

        .filters-group {
            display: flex; flex-direction: column; gap: 1rem; background: rgba(0,0,0,0.2);
            padding: 1rem; border-radius: var(--radius-sm); border: 1px solid var(--app-border);
        }
        .filter-ctrl { display: flex; flex-direction: column; gap: 0.5rem; }
        .filter-ctrl label { font-size: 0.85rem; font-weight: 600; color: var(--app-text-muted); display: flex; justify-content: space-between; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--app-accent); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.2); border-radius: 2px; }

        .btn-group { display: flex; flex-direction: column; gap: 1rem; justify-content: center; }
        .btn {
            padding: 1rem 1.5rem; font-size: 1rem; font-weight: 600; font-family: var(--font-ui);
            border: none; border-radius: 50px; cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 0.75rem; text-transform: uppercase;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn svg { width: 22px; height: 22px; }

        .btn-primary { background: var(--app-primary); color: white; box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3); }
        .btn-primary:hover:not(:disabled) { background: var(--app-primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--app-border); }
        .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .btn-accent { background: var(--app-accent); color: #000; box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3); }
        .btn-accent:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); }

        /* ==========================================================================
           5. PROCESSING & RESULT SECTION
           ========================================================================== */
        .processing-view {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 4rem 0; text-align: center;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid rgba(245, 158, 11, 0.2);
            border-top-color: var(--app-accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 1.5rem;
        }

        .result-mockup {
            width: 100%; max-width: 550px; background: #fff; padding: 15px;
            border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
            margin: 0 auto 2rem auto; transition: transform 0.3s ease;
        }
        .result-mockup:hover { transform: scale(1.02); }
        
        #finalCanvas {
            width: 100%; height: auto; display: block; box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        /* ==========================================================================
           6. GALLERY SECTION
           ========================================================================== */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem; width: 100%; padding: 1rem 0;
        }
        .gallery-item {
            position: relative; background: #fff; padding: 10px; border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer; transition: var(--transition);
        }
        .gallery-item img { width: 100%; height: auto; display: block; }
        .gallery-item:hover { transform: translateY(-5px) scale(1.03); z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .empty-gallery { width: 100%; text-align: center; padding: 4rem 0; color: var(--app-text-muted); font-size: 1.2rem; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9); color: white; padding: 1rem 2rem; border-radius: 50px;
            font-weight: 500; opacity: 0; transition: var(--transition); z-index: 9999;
            border: 1px solid var(--app-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        @media (max-width: 768px) {
            .controls-panel { grid-template-columns: 1fr; }
            .brand h1 { font-size: 1.2rem; }
            .app-panel { padding: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>
    <div id="toast" class="toast">Hệ thống sẵn sàng</div>

    <nav class="navbar">
        <div class="brand">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--app-accent)" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <div>
                <h1>Đăng Tùng Photobooth</h1>
                <div class="brand-subtitle">Trạm Lưu Trữ Lễ Hội Đền Đô</div>
            </div>
        </div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="App.switchTab('camera')">Phòng Chụp</button>
            <button class="nav-btn" onclick="App.switchTab('gallery')">Thư Viện</button>
        </div>
    </nav>

    <main class="main-container">
        <section id="tab-camera" class="tab-content active">
            <div class="app-panel">
                <div class="status-header">
                    <span id="statusText" style="color: var(--app-text-muted); font-size: 0.9rem; font-weight: 500;">Sẵn sàng khởi động Camera</span>
                    <div class="photo-indicators">
                        <div class="dot" id="dot1"></div>
                        <div class="dot" id="dot2"></div>
                        <div class="dot" id="dot3"></div>
                    </div>
                </div>

                <div class="viewfinder-container" id="viewfinder">
                    <video id="videoElement" autoplay playsinline></video>
                    <div class="grid-lines"></div>
                    <div class="countdown-overlay" id="countdownDisplay">3</div>
                    <div class="flash-effect" id="flashEffect"></div>
                </div>

                <div class="controls-panel">
                    <div class="filters-group">
                        <div class="filter-ctrl">
                            <label><span>Độ Sáng (Brightness)</span> <span id="valBrightness">100%</span></label>
                            <input type="range" id="slBrightness" min="50" max="150" value="100">
                        </div>
                        <div class="filter-ctrl">
                            <label><span>Độ Tương Phản (Contrast)</span> <span id="valContrast">100%</span></label>
                            <input type="range" id="slContrast" min="50" max="150" value="100">
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button id="btnSwitchCam" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                            Đổi Camera
                        </button>
                        <button id="btnCapture" class="btn btn-primary" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                            Tải Camera...
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-processing" class="tab-content">
            <div class="app-panel processing-view">
                <div class="spinner"></div>
                <h2 style="color: var(--app-accent); font-size: 1.5rem; margin-bottom: 0.5rem;">Đang rửa bản in chuyên nghiệp...</h2>
                <p style="color: var(--app-text-muted);">Áp dụng thuật toán Text Wrapping thông minh và Render High-Res.</p>
            </div>
        </section>

        <section id="tab-result" class="tab-content">
            <div class="result-mockup">
                <canvas id="finalCanvas" width="1200" height="1600"></canvas>
            </div>
            
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                <button id="btnRetake" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Chụp Phiên Mới
                </button>
                <button id="btnDownload" class="btn btn-accent">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Lưu Máy & Thêm Vào Thư Viện
                </button>
            </div>
        </section>

        <section id="tab-gallery" class="tab-content">
            <div class="app-panel" style="max-width: 1000px; padding: 2rem;">
                <h2 style="margin-bottom: 1rem; border-bottom: 1px solid var(--app-border); padding-bottom: 1rem;">Nhật Ký Sự Kiện Lễ Hội Đền Đô</h2>
                <div id="galleryContainer" class="gallery-grid">
                    <div class="empty-gallery">Chưa có bức ảnh nào được chụp trong phiên làm việc này.</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const CONFIG = {
            photosNeeded: 3,
            countdownSecs: 3,
            layoutW: 1200,
            layoutH: 1600,
            fonts: { text: "'Cormorant Garamond', 'Times New Roman', serif" },
            colors: { bg: '#F8F4E6', text: '#2C1E16', title: '#9B1C1C', accent: '#B48600' }
        };

        const State = {
            capturedCanvases: [],
            facingMode: 'user',
            stream: null,
            filters: { brightness: 100, contrast: 100 },
            isProcessing: false,
            galleryData: []
        };

        const UI = {
            els: {
                video: document.getElementById('videoElement'),
                viewfinder: document.getElementById('viewfinder'),
                countdown: document.getElementById('countdownDisplay'),
                flash: document.getElementById('flashEffect'),
                finalCanvas: document.getElementById('finalCanvas'),
                gallery: document.getElementById('galleryContainer'),
                toast: document.getElementById('toast'),
                statusText: document.getElementById('statusText'),
                dots: [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')],
                btnCap: document.getElementById('btnCapture'),
                btnSwitch: document.getElementById('btnSwitchCam'),
                btnRetake: document.getElementById('btnRetake'),
                btnDown: document.getElementById('btnDownload'),
                slBright: document.getElementById('slBrightness'),
                slCont: document.getElementById('slContrast'),
                vBright: document.getElementById('valBrightness'),
                vCont: document.getElementById('valContrast'),
            },

            showToast(msg, ms = 3000) {
                this.els.toast.innerText = msg;
                this.els.toast.classList.add('show');
                setTimeout(() => this.els.toast.classList.remove('show'), ms);
            },

            switchTab(tabId) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + tabId).classList.add('active');
                
                const btns = document.querySelectorAll('.nav-btn');
                if (tabId === 'camera') btns[0].classList.add('active');
                if (tabId === 'gallery') {
                    btns[1].classList.add('active');
                    this.renderGallery();
                }
            },

            updateProgress() {
                const len = State.capturedCanvases.length;
                this.els.dots.forEach((dot, idx) => {
                    dot.className = idx < len ? 'dot active' : 'dot';
                });
                
                if (len === 0) {
                    this.els.btnCap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> Bấm Để Chụp (1/3)`;
                    this.els.statusText.innerText = "Sẵn sàng tạo dáng!";
                } else if (len < CONFIG.photosNeeded) {
                    this.els.btnCap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> Chụp Kiểu Kế (${len + 1}/3)`;
                    this.els.statusText.innerText = `Hoàn thành ${len}/3. Đổi dáng ngầu hơn nhé!`;
                }
            },

            triggerFlash() {
                this.els.flash.style.animation = 'none';
                this.els.flash.offsetHeight;
                this.els.flash.style.animation = 'flashAnim 0.5s ease-out forwards';
            },

            renderGallery() {
                if (State.galleryData.length === 0) {
                    this.els.gallery.innerHTML = '<div class="empty-gallery">Chưa có ảnh nào. Hãy qua phòng chụp ngay!</div>';
                    return;
                }
                let html = '';
                [...State.galleryData].reverse().forEach(src => {
                    html += `<div class="gallery-item" onclick="window.open('${src}', '_blank')"><img src="${src}" alt="Photobooth"></div>`;
                });
                this.els.gallery.innerHTML = html;
            }
        };

        const Camera = {
            async init() {
                if (State.stream) State.stream.getTracks().forEach(t => t.stop());
                UI.els.btnCap.disabled = true;

                try {
                    State.stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: State.facingMode },
                        audio: false
                    });
                    
                    UI.els.video.srcObject = State.stream;
                    UI.els.video.style.transform = State.facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                    
                    UI.els.video.onloadedmetadata = () => {
                        UI.els.btnCap.disabled = false;
                        UI.updateProgress();
                    };
                } catch (e) {
                    UI.els.statusText.innerText = "Lỗi truy cập Camera. Cần cấp quyền!";
                    UI.els.statusText.style.color = "var(--app-primary)";
                    UI.showToast("Không tìm thấy Camera");
                }
            },

            applyVideoFilters() {
                const f = State.filters;
                UI.els.video.style.filter = `brightness(${f.brightness}%) contrast(${f.contrast}%)`;
            },

            captureFrame() {
                const tempCanvas = document.createElement('canvas');
                const vW = UI.els.video.videoWidth;
                const vH = UI.els.video.videoHeight;
                const targetRatio = 4 / 3;
                let cropX = 0, cropY = 0, cropW = vW, cropH = vH;

                if (vW / vH > targetRatio) {
                    cropW = cropH * targetRatio;
                    cropX = (vW - cropW) / 2;
                } else {
                    cropH = cropW / targetRatio;
                    cropY = (vH - cropH) / 2;
                }

                tempCanvas.width = 1200; tempCanvas.height = 900;
                const ctx = tempCanvas.getContext('2d');
                ctx.filter = `brightness(${State.filters.brightness}%) contrast(${State.filters.contrast}%)`;

                if (State.facingMode === 'user') {
                    ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1);
                }
                
                ctx.drawImage(UI.els.video, cropX, cropY, cropW, cropH, 0, 0, tempCanvas.width, tempCanvas.height);
                return tempCanvas;
            }
        };

        const Graphics = {
            ctx: UI.els.finalCanvas.getContext('2d'),
            
            drawTextStrictBounds(text, x, y, maxWidth, lineHeight) {
                const paragraphs = text.split('\n');
                let currentY = y;
                for (let p of paragraphs) {
                    const words = p.split(' ');
                    let line = '';
                    for (let n = 0; n < words.length; n++) {
                        const testLine = line + words[n] + ' ';
                        const metrics = this.ctx.measureText(testLine);
                        if (metrics.width > maxWidth && n > 0) {
                            this.ctx.fillText(line.trim(), x, currentY);
                            line = words[n] + ' ';
                            currentY += lineHeight;
                        } else {
                            line = testLine;
                        }
                    }
                    this.ctx.fillText(line.trim(), x, currentY);
                    currentY += lineHeight;
                }
                return currentY;
            },

            drawStar(cx, cy, r, color) {
                this.ctx.beginPath(); this.ctx.moveTo(cx, cy - r);
                for (let i = 0; i < 5; i++) {
                    this.ctx.lineTo(cx + Math.cos(Math.PI/2*3 + Math.PI/5 * (2*i)) * r, cy + Math.sin(Math.PI/2*3 + Math.PI/5 * (2*i)) * r);
                    this.ctx.lineTo(cx + Math.cos(Math.PI/2*3 + Math.PI/5 * (2*i+1)) * (r/2.2), cy + Math.sin(Math.PI/2*3 + Math.PI/5 * (2*i+1)) * (r/2.2));
                }
                this.ctx.closePath(); this.ctx.fillStyle = color; this.ctx.fill();
            },

            drawDecorLines(yPos) {
                this.ctx.beginPath();
                this.ctx.setLineDash([8, 8]);
                this.ctx.moveTo(60, yPos); this.ctx.lineTo(1140, yPos);
                this.ctx.strokeStyle = CONFIG.colors.text; this.ctx.lineWidth = 1.5;
                this.ctx.stroke(); this.ctx.setLineDash([]);
            },

            async renderFinalLayout() {
                await document.fonts.ready;
                const ctx = this.ctx;
                const { layoutW: w, layoutH: h, fonts, colors: c } = CONFIG;
                
                ctx.fillStyle = c.bg; ctx.fillRect(0, 0, w, h);
                
                for(let i=0; i<5000; i++) {
                    ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.03})`;
                    ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
                }

                ctx.strokeStyle = c.text; ctx.lineWidth = 2;
                ctx.strokeRect(30, 30, w - 60, h - 60);
                ctx.lineWidth = 1; ctx.strokeRect(36, 36, w - 72, h - 72);

                ctx.beginPath(); ctx.roundRect(60, 60, 240, 90, 20); ctx.stroke();
                ctx.fillStyle = c.text; ctx.textAlign = "center";
                ctx.font = `bold 28px ${fonts.text}`; ctx.fillText("Đăng Tùng", 180, 100);
                ctx.font = `italic 22px ${fonts.text}`; ctx.fillText("Photobooth", 180, 135);

                ctx.fillStyle = c.title; ctx.textAlign = "left";
                ctx.font = `bold 90px ${fonts.text}`; ctx.fillText("LỄ HỘI ĐỀN ĐÔ", 340, 135);

                this.drawDecorLines(180);

                ctx.fillStyle = c.text; ctx.fillRect(56, 216, 688, 518);
                ctx.drawImage(State.capturedCanvases[0], 60, 220, 680, 510);
                
                ctx.fillRect(56, 756, 338, 255);
                ctx.drawImage(State.capturedCanvases[1], 60, 760, 330, 247.5);
                
                ctx.fillRect(406, 756, 338, 255);
                ctx.drawImage(State.capturedCanvases[2], 410, 760, 330, 247.5);

                // Đã bỏ dòng chữ tài trợ quyche netwrk an cf
                ctx.strokeRect(60, 1070, 680, 160);
                ctx.fillStyle = c.title; ctx.fillRect(70, 1080, 100, 140);
                this.drawStar(120, 1120, 20, c.accent); this.drawStar(120, 1180, 20, c.accent);
                
                ctx.fillStyle = c.title; ctx.textAlign = "center";
                ctx.font = `bold 55px ${fonts.text}`; ctx.fillText("TỰ HÀO LÀ NGƯỜI", 410, 1140);
                ctx.fillText("VIỆT NAM", 410, 1205);

                const rx = 760; const rw = 380;
                
                ctx.strokeStyle = c.text; ctx.lineWidth = 2;
                ctx.strokeRect(rx, 220, rw, 1030);
                ctx.lineWidth = 1; ctx.strokeRect(rx+6, 226, rw-12, 1018);

                ctx.fillStyle = c.text; ctx.textAlign = "left";
                ctx.font = `bold 60px ${fonts.text}`; ctx.fillText("BẢN TIN", rx + 25, 300);
                
                ctx.fillStyle = c.title; ctx.fillRect(rx + rw - 85, 250, 60, 40);
                this.drawStar(rx + rw - 55, 270, 12, c.accent);

                ctx.fillStyle = c.text;
                ctx.font = `24px ${fonts.text}`;
                const content = "Đền Đô hay còn gọi là (Đền Lý Bát Đế, Cổ Pháp Điện) được xây dựng vào thế kỷ XI, nằm ở phường Đình Bảng, TP Từ Sơn. Nơi đây thờ 8 vị vua triều Lý.\n\nĐền được dựng trên nền đất mà khi xưa vua Lý Công Uẩn đăng quang và trở lại thăm quê hương. Theo sử sách, dân làng đã cho xây dựng một ngôi nhà lớn làm nơi nghênh tiếp nhà vua.\n\nNhắc đến Bắc Ninh, người ta thường nghĩ đến những làn điệu Quan họ ngọt ngào, những làng nghề truyền thống và văn hóa lâu đời đậm đà bản sắc dân tộc.";
                
                // Vẽ văn bản
                this.drawTextStrictBounds(content, rx + 25, 350, rw - 50, 36);

                // Dời hình đền lùi xuống dưới sát đáy cột Bản tin
                const templeY = 1200; 
                ctx.fillStyle = c.text;
                ctx.fillRect(rx + rw/2 - 80, templeY, 160, 12); 
                ctx.fillRect(rx + rw/2 - 60, templeY-40, 15, 40); ctx.fillRect(rx + rw/2 + 45, templeY-40, 15, 40);
                ctx.beginPath(); ctx.moveTo(rx + rw/2 - 100, templeY-40); ctx.lineTo(rx + rw/2 + 100, templeY-40);
                ctx.lineTo(rx + rw/2 + 60, templeY-70); ctx.lineTo(rx + rw/2 - 60, templeY-70); ctx.fill();
                ctx.fillRect(rx + rw/2 - 25, templeY-100, 50, 30);
                ctx.beginPath(); ctx.moveTo(rx + rw/2 - 50, templeY-100); ctx.lineTo(rx + rw/2 + 50, templeY-100);
                ctx.lineTo(rx + rw/2 + 30, templeY-130); ctx.lineTo(rx + rw/2 - 30, templeY-130); ctx.fill();
                ctx.strokeStyle = c.text; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(rx + rw/2 - 100, templeY-55, 15, 0.5*Math.PI, 1.5*Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.arc(rx + rw/2 + 100, templeY-55, 15, 1.5*Math.PI, 0.5*Math.PI); ctx.stroke();

                // Đã bỏ QR Code. Căn giữa lại chân trang.
                this.drawDecorLines(1290);
                
                ctx.fillStyle = c.text; ctx.textAlign = "center";
                ctx.font = `bold 42px ${fonts.text}`;
                ctx.fillText("Chào Mừng Đến Với Di Tích Quốc Gia Đặc Biệt Lễ Hội Đền Đô", w / 2, 1420);
                ctx.font = `italic 28px ${fonts.text}`;
                ctx.fillText("Bắc Ninh, Ngày " + new Date().toLocaleDateString('vi-VN'), w / 2, 1480);
            }
        };

        const App = {
            init() {
                this.bindEvents();
                this.initParticles();
                Camera.init();
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                this.audioCtx = new AudioCtx();
            },

            beep(freq = 880, dur = 0.1, type = 'sine') {
                if(!this.audioCtx) return;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, this.audioCtx.currentTime + dur);
                osc.stop(this.audioCtx.currentTime + dur);
            },

            bindEvents() {
                UI.els.btnSwitch.onclick = () => {
                    State.facingMode = State.facingMode === 'user' ? 'environment' : 'user';
                    Camera.init();
                };

                UI.els.slBright.oninput = (e) => { State.filters.brightness = e.target.value; UI.els.vBright.innerText = e.target.value + '%'; Camera.applyVideoFilters(); };
                UI.els.slCont.oninput = (e) => { State.filters.contrast = e.target.value; UI.els.vCont.innerText = e.target.value + '%'; Camera.applyVideoFilters(); };

                UI.els.btnCap.onclick = () => this.runCountdown();

                UI.els.btnRetake.onclick = () => {
                    State.capturedCanvases = [];
                    UI.updateProgress();
                    UI.switchTab('camera');
                };

                UI.els.btnDown.onclick = () => {
                    const dataUrl = UI.els.finalCanvas.toDataURL('image/jpeg', 0.95);
                    const a = document.createElement('a');
                    a.download = `DangTung-Photobooth-${Date.now()}.jpg`;
                    a.href = dataUrl; a.click();
                    State.galleryData.push(dataUrl);
                    UI.showToast("Đã lưu vào máy & Thư viện!");
                };
            },

            runCountdown() {
                if (State.isProcessing) return;
                State.isProcessing = true;
                UI.els.btnCap.disabled = true;
                UI.els.btnSwitch.disabled = true;
                
                let counter = CONFIG.countdownSecs;
                UI.els.countdown.style.display = 'flex';
                UI.els.countdown.innerText = counter;
                this.beep(880, 0.1);

                const iv = setInterval(() => {
                    counter--;
                    if (counter > 0) {
                        UI.els.countdown.innerText = counter;
                        this.beep(880, 0.1);
                    } else {
                        clearInterval(iv);
                        UI.els.countdown.style.display = 'none';
                        this.takePhoto();
                    }
                }, 1000);
            },

            takePhoto() {
                this.beep(200, 0.1, 'square');
                UI.triggerFlash();
                
                const frame = Camera.captureFrame();
                State.capturedCanvases.push(frame);
                
                State.isProcessing = false;
                UI.els.btnSwitch.disabled = false;
                UI.updateProgress();

                if (State.capturedCanvases.length >= CONFIG.photosNeeded) {
                    this.processFinal();
                } else {
                    UI.els.btnCap.disabled = false;
                }
            },

            processFinal() {
                UI.switchTab('processing');
                setTimeout(async () => {
                    await Graphics.renderFinalLayout();
                    UI.switchTab('result');
                    UI.showToast("Bản in của bạn đã sẵn sàng!");
                }, 1200);
            },

            switchTab: (id) => UI.switchTab(id),

            initParticles() {
                const canvas = document.getElementById('particleCanvas');
                const ctx = canvas.getContext('2d');
                let w, h, particles = [];
                
                const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();

                for(let i=0; i<40; i++) {
                    particles.push({
                        x: Math.random() * w, y: Math.random() * h,
                        r: Math.random() * 2 + 0.5,
                        dy: Math.random() * -0.5 - 0.2,
                        op: Math.random() * 0.5 + 0.1
                    });
                }

                const animate = () => {
                    ctx.clearRect(0, 0, w, h);
                    particles.forEach(p => {
                        p.y += p.dy;
                        if(p.y < 0) { p.y = h; p.x = Math.random() * w; }
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(245, 158, 11, ${p.op})`; ctx.fill();
                    });
                    requestAnimationFrame(animate);
                };
                animate();
            }
        };

        window.addEventListener('DOMContentLoaded', () => App.init());

    </script>
</body>
