<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Lễ Hội Đền Đô</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --gold: #d4af37;
            --bg-dark: #1a1a1a;
        }
        
        body {
            margin: 0;
            padding: 20px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--gold);
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #444;
            max-width: 95vw;
        }

        .view-screen {
            position: relative;
            width: 680px;  /* Trùng với width của ảnh chính (Main) */
            height: 510px; /* Trùng với height của ảnh chính */
            background: #000;
            border: 4px solid var(--gold);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        @media (max-width: 768px) {
            .view-screen {
                width: 100%;
                height: auto;
                aspect-ratio: 4/3;
            }
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Hiệu ứng gương */
        }

        /* Result Canvas ẩn đi lúc đầu, hiển thị sau khi chụp xong */
        canvas#resultCanvas {
            display: none;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        #captureBtn {
            background-color: var(--primary-red);
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        #captureBtn:hover:not(:disabled) {
            background-color: #a00000;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        #retakeBtn, #downloadBtn {
            display: none;
        }

        #retakeBtn {
            background-color: #444;
            color: white;
            border: 1px solid #666;
        }
        
        #retakeBtn:hover { background-color: #555; }

        #downloadBtn {
            background-color: var(--gold);
            color: var(--primary-red);
        }
        
        #downloadBtn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .status {
            margin-top: 20px;
            font-size: 20px;
            color: var(--gold);
            font-weight: bold;
            text-align: center;
            min-height: 30px;
        }

        .photo-count {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #555;
            border: 2px solid var(--gold);
        }
        .dot.active {
            background: var(--primary-red);
            box-shadow: 0 0 10px var(--primary-red);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 Photobooth Đền Đô</h1>
    </div>

    <div class="app-container">
        
        <div class="photo-count" id="photoIndicators">
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
        </div>

        <div class="view-screen">
            <video id="video" autoplay playsinline></video>
            <canvas id="resultCanvas" width="900" height="1200"></canvas>
        </div>

        <div class="controls">
            <button id="captureBtn" disabled>Đang tải camera...</button>
            <button id="retakeBtn">🔄 Chụp lại</button>
            <button id="downloadBtn">📥 Lưu Ảnh</button>
        </div>
        
        <div class="status" id="statusText">Vui lòng cho phép truy cập Camera</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultCanvas = document.getElementById('resultCanvas');
        const ctx = resultCanvas.getContext('2d');
        
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');
        const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

        let photoData = [];
        let stream = null;
        
        // --- 1. TẢI FRAME ẢNH TRƯỚC ---
        const frameImg = new Image();
        // File này phải nằm cùng thư mục hoặc là link URL hợp lệ
        frameImg.src = 'frame.png'; 
        let frameLoaded = false;
        
        frameImg.onload = () => {
            frameLoaded = true;
            checkReadyStatus();
        };

        frameImg.onerror = () => {
            statusText.innerText = "Lỗi: Không tìm thấy file frame.png!";
            statusText.style.color = "red";
        };

        // --- 2. KHỞI ĐỘNG CAMERA ---
        async function initCamera() {
            try {
                // Ưu tiên camera trước (nếu chạy trên điện thoại/laptop)
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                
                // Đợi video chạy mới cho phép chụp
                video.onplaying = () => {
                    checkReadyStatus();
                };
            } catch (err) {
                console.error(err);
                statusText.innerText = "Lỗi Camera. Hãy kiểm tra quyền truy cập!";
                statusText.style.color = "red";
            }
        }

        function checkReadyStatus() {
            if (frameLoaded && video.readyState >= 3) {
                captureBtn.disabled = false;
                captureBtn.innerText = "Chụp Ảnh (1/3)";
                statusText.innerText = "Chuẩn bị... Cười lên nào!";
            }
        }

        // --- 3. XỬ LÝ CHỤP ẢNH ---
        function takePhoto() {
            // Flash effect (hiệu ứng chớp nháy trắng màn hình)
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0'; flash.style.left = '0'; flash.style.width = '100%'; flash.style.height = '100%';
            flash.style.backgroundColor = 'white';
            flash.style.zIndex = '10';
            flash.style.opacity = '1';
            flash.style.transition = 'opacity 0.5s ease-out';
            document.querySelector('.view-screen').appendChild(flash);
            
            setTimeout(() => flash.style.opacity = '0', 50);
            setTimeout(() => flash.remove(), 500);

            // Bắt khung hình hiện tại
            const tempCanvas = document.createElement('canvas');
            // Cắt ra một tỷ lệ 4:3 từ video HD để ảnh không bị méo
            const videoRatio = video.videoWidth / video.videoHeight;
            const targetRatio = 4/3;
            
            let sx = 0, sy = 0, sWidth = video.videoWidth, sHeight = video.videoHeight;

            if (videoRatio > targetRatio) {
                // Video rộng hơn (ví dụ 16:9), cần cắt hai bên
                sWidth = sHeight * targetRatio;
                sx = (video.videoWidth - sWidth) / 2;
            }

            tempCanvas.width = 800; // Độ phân giải ảnh capture
            tempCanvas.height = 600;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Xử lý lật gương (mirror)
            tempCtx.translate(tempCanvas.width, 0);
            tempCtx.scale(-1, 1);
            
            // Vẽ phần đã cắt lên tempCanvas
            tempCtx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, tempCanvas.width, tempCanvas.height);
            
            photoData.push(tempCanvas);
            updateDots();
            
            if (photoData.length < 3) {
                captureBtn.innerText = `Chụp Ảnh (${photoData.length + 1}/3)`;
                statusText.innerText = `Tuyệt! Chụp tiếp kiểu thứ ${photoData.length + 1} nào`;
            } else {
                generateFinalPoster();
            }
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < photoData.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        // --- 4. RENDER GHÉP ẢNH ---
        function generateFinalPoster() {
            video.style.display = 'none';
            resultCanvas.style.display = 'block';
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-block';
            downloadBtn.style.display = 'inline-block';
            statusText.innerText = "Hoàn thành! Bạn có thể tải ảnh về 🇻🇳";

            // Xóa canvas
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);

            // BƯỚC A: Vẽ 3 ảnh chụp nằm ở LỚP DƯỚI CÙNG
            // Tọa độ này khớp với các lỗ hổng của frame.png
            ctx.drawImage(photoData[0], 110, 240, 680, 510); // Ảnh 1 (Main)
            ctx.drawImage(photoData[1], 110, 830, 320, 240); // Ảnh 2 (Sub 1)
            ctx.drawImage(photoData[2], 470, 830, 320, 240); // Ảnh 3 (Sub 2)

            // BƯỚC B: Vẽ Frame (khung có lỗ thủng trong suốt) lên LỚP TRÊN CÙNG
            ctx.drawImage(frameImg, 0, 0, resultCanvas.width, resultCanvas.height);
        }

        // --- 5. SỰ KIỆN NÚT BẤM ---
        captureBtn.addEventListener('click', takePhoto);

        retakeBtn.addEventListener('click', () => {
            photoData = [];
            updateDots();
            video.style.display = 'block';
            resultCanvas.style.display = 'none';
            captureBtn.style.display = 'inline-block';
            retakeBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
            captureBtn.innerText = 'Chụp Ảnh (1/3)';
            statusText.innerText = "Chuẩn bị... Cười lên nào!";
        });

        downloadBtn.addEventListener('click', () => {
            // Lấy thời gian hiện tại làm tên file
            const dateStr = new Date().toISOString().replace(/[:.]/g, '-');
            const link = document.createElement('a');
            link.download = `Photobooth-DenDo-${dateStr}.png`;
            link.href = resultCanvas.toDataURL('image/png', 1.0); // Xuất chất lượng cao nhất
            link.click();
        });

        // Chạy Camera khi mở trang
        window.addEventListener('load', initCamera);

    </script>
</body>
</html>
