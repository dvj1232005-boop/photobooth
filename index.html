<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Tùng Photobooth - Lễ Hội Đền Đô</title>
    <style>
        :root {
            --primary-red: #A82C2D;
            --primary-red-hover: #8A2020;
            --gold: #d4af37;
            --bg-dark: #121212;
            --surface: rgba(30, 30, 30, 0.85);
            --text-dark: #4A3525;
        }
        
        body {
            margin: 0; padding: 20px 10px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #2a2a2a 0%, #0a0a0a 80%);
            color: white; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .header h1 { 
            color: var(--gold); margin: 0 0 20px 0; font-size: 28px; 
            text-transform: uppercase; letter-spacing: 2px; 
            text-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); text-align: center;
        }

        .app-container {
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            background: var(--surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 25px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.08); max-width: 95vw; width: 680px;
        }

        /* --- UI TRẠNG THÁI CAMERA --- */
        .camera-section { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        .photo-count { display: flex; gap: 12px; margin-bottom: 20px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: 0.3s; }
        .dot.active { background: var(--primary-red); transform: scale(1.3); box-shadow: 0 0 15px var(--primary-red); }

        .view-screen {
            position: relative; width: 100%; max-width: 640px; aspect-ratio: 4/3;
            background: #000; border: 2px solid rgba(212, 175, 55, 0.4); 
            border-radius: 16px; overflow: hidden; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        #countdownOverlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center;
            font-size: 140px; font-weight: 800; color: white; text-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10;
        }

        /* --- UI TRẠNG THÁI KẾT QUẢ (Mockup Bản In) --- */
        .result-section { 
            display: none; flex-direction: column; align-items: center; width: 100%; 
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .print-mockup {
            background: #fff; padding: 10px; border-radius: 8px; /* Giả lập viền trắng của ảnh thật */
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.1);
            margin-bottom: 25px; max-width: 100%; transition: transform 0.3s;
        }
        .print-mockup:hover { transform: translateY(-5px) scale(1.02); }

        canvas#resultCanvas {
            display: block; width: 100%; max-width: 500px; height: auto;
            border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* Hiệu ứng loading xử lý ảnh */
        .processing-loader {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 0; color: var(--gold);
        }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(212, 175, 55, 0.3); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

        /* --- NÚT BẤM CHUYÊN NGHIỆP --- */
        .controls { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; margin-top: 20px;}
        button {
            padding: 16px 32px; font-size: 16px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 10px; min-width: 200px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        #captureBtn { background-color: var(--primary-red); color: white; box-shadow: 0 8px 25px rgba(168, 44, 45, 0.4); }
        #captureBtn:hover:not(:disabled) { background-color: var(--primary-red-hover); transform: translateY(-3px); }

        #retakeBtn { background-color: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        #retakeBtn:hover { background-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
        
        #downloadBtn { background-color: var(--gold); color: var(--bg-dark); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        #downloadBtn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .status { margin-top: 20px; font-size: 15px; color: #bbb; text-align: center; height: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 Đăng Tùng Photobooth</h1>
    </div>

    <div class="app-container">
        
        <!-- Section 1: Camera View -->
        <div class="camera-section" id="cameraSection">
            <div class="photo-count" id="photoIndicators">
                <div class="dot" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
            </div>

            <div class="view-screen">
                <video id="video" autoplay playsinline></video>
                <div id="countdownOverlay">3</div>
            </div>

            <div class="controls">
                <button id="captureBtn" disabled>Khởi động Camera...</button>
            </div>
            <div class="status" id="statusText">Vui lòng cấp quyền truy cập Camera</div>
        </div>

        <!-- Section 2: Loading -->
        <div class="processing-loader" id="loaderSection">
            <div class="spinner"></div>
            <h3>Đang rửa ảnh, vui lòng đợi...</h3>
        </div>

        <!-- Section 3: Kết quả (Bản in) -->
        <div class="result-section" id="resultSection">
            <div class="print-mockup">
                <canvas id="resultCanvas" width="900" height="1200"></canvas>
            </div>
            <div class="controls">
                <button id="retakeBtn">🔄 Chụp Lượt Mới</button>
                <button id="downloadBtn">📥 Tải Ảnh (Bản In)</button>
            </div>
            <div class="status">Đã hoàn tất! Cảm ơn bạn đã trải nghiệm.</div>
        </div>

    </div>

    <script>
        const video = document.getElementById('video');
        const resultCanvas = document.getElementById('resultCanvas');
        const ctx = resultCanvas.getContext('2d');
        const overlay = document.getElementById('countdownOverlay');
        
        const cameraSection = document.getElementById('cameraSection');
        const loaderSection = document.getElementById('loaderSection');
        const resultSection = document.getElementById('resultSection');

        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');
        const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

        let photoData = [];
        let stream = null;

        const iconCamera = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>`;

        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" }, audio: false
                });
                video.srcObject = stream;
                video.onplaying = () => {
                    captureBtn.disabled = false;
                    captureBtn.innerHTML = `${iconCamera} Bấm Để Chụp (1/3)`;
                    statusText.innerText = "Sẵn sàng! Hãy chuẩn bị pose dáng.";
                };
            } catch (err) {
                statusText.innerText = "Lỗi Camera! Vui lòng cấp quyền."; statusText.style.color = "#ff5252";
            }
        }

        function startCaptureProcess() {
            captureBtn.disabled = true; let counter = 3;
            overlay.style.display = 'flex'; overlay.innerText = counter;
            statusText.innerText = "Chuẩn bị...";
            const interval = setInterval(() => {
                counter--;
                if (counter > 0) overlay.innerText = counter;
                else {
                    clearInterval(interval); overlay.style.display = 'none';
                    executeCapture();
                }
            }, 1000);
        }

        function executeCapture() {
            // Flash Effect
            const flash = document.createElement('div');
            flash.style.position = 'absolute'; flash.style.inset = '0';
            flash.style.backgroundColor = 'white'; flash.style.zIndex = '20';
            flash.style.transition = 'opacity 0.4s';
            document.querySelector('.view-screen').appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 50); setTimeout(() => flash.remove(), 400);

            // Cắt ảnh 4:3
            const tempCanvas = document.createElement('canvas');
            const targetRatio = 4/3; let sx = 0, sy = 0, sWidth = video.videoWidth, sHeight = video.videoHeight;
            if (video.videoWidth / video.videoHeight > targetRatio) {
                sWidth = sHeight * targetRatio; sx = (video.videoWidth - sWidth) / 2;
            }
            tempCanvas.width = 800; tempCanvas.height = 600;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.translate(tempCanvas.width, 0); tempCtx.scale(-1, 1);
            tempCtx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, tempCanvas.width, tempCanvas.height);
            photoData.push(tempCanvas);
            
            dots.forEach((dot, idx) => { if (idx < photoData.length) dot.classList.add('active'); else dot.classList.remove('active'); });
            
            if (photoData.length < 3) {
                captureBtn.disabled = false;
                captureBtn.innerHTML = `${iconCamera} Chụp Tiếp (${photoData.length + 1}/3)`;
                statusText.innerText = `Đã chụp ${photoData.length}/3. Đổi dáng và bấm tiếp!`;
            } else {
                // Chuyển sang màn hình Loading
                cameraSection.style.display = 'none';
                loaderSection.style.display = 'flex';
                // Đợi 1.5s giả lập rửa ảnh, sau đó render
                setTimeout(() => {
                    generateFinalPoster();
                    loaderSection.style.display = 'none';
                    resultSection.style.display = 'flex';
                }, 1500);
            }
        }

        // --- HÀM VẼ GRAPHIC CHUYÊN NGHIỆP ---
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            let words = text.split(' '); let line = '';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' '; let metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) { context.fillText(line, x, y); line = words[n] + ' '; y += lineHeight; }
                else { line = testLine; }
            }
            context.fillText(line, x, y);
        }

        function drawStar(ctx, cx, cy, r, color) {
            ctx.beginPath(); ctx.moveTo(cx, cy - r);
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(cx + Math.cos(Math.PI/2*3 + Math.PI/5 * (2*i)) * r, cy + Math.sin(Math.PI/2*3 + Math.PI/5 * (2*i)) * r);
                ctx.lineTo(cx + Math.cos(Math.PI/2*3 + Math.PI/5 * (2*i+1)) * (r/2.2), cy + Math.sin(Math.PI/2*3 + Math.PI/5 * (2*i+1)) * (r/2.2));
            }
            ctx.closePath(); ctx.fillStyle = color; ctx.fill();
        }

        function drawTemple(ctx, cx, cy) {
            ctx.fillStyle = "#3a2a1a"; ctx.fillRect(cx-50, cy, 100, 8); ctx.fillRect(cx-35, cy-25, 8, 25); 
            ctx.fillRect(cx+27, cy-25, 8, 25); ctx.fillRect(cx-8, cy-25, 16, 25); 
            ctx.beginPath(); ctx.moveTo(cx-60, cy-25); ctx.lineTo(cx+60, cy-25); ctx.lineTo(cx+40, cy-40); ctx.lineTo(cx-40, cy-40); ctx.fill();
            ctx.fillRect(cx-15, cy-55, 30, 15); ctx.beginPath(); ctx.moveTo(cx-35, cy-55); ctx.lineTo(cx+35, cy-55); ctx.lineTo(cx+20, cy-70); ctx.lineTo(cx-20, cy-70); ctx.fill();
            ctx.beginPath(); ctx.arc(cx-60, cy-35, 10, 0.5*Math.PI, 1.5*Math.PI); ctx.stroke(); ctx.beginPath(); ctx.arc(cx+60, cy-35, 10, 1.5*Math.PI, 0.5*Math.PI); ctx.stroke();
        }

        function generateFinalPoster() {
            const w = 900, h = 1200;
            const textDark = "#4A3525", redColor = "#A82C2D", goldColor = "#E6C229";
            
            // Background Giấy Craft Gradient xịn
            const bgGradient = ctx.createLinearGradient(0, 0, w, h);
            bgGradient.addColorStop(0, "#E8D8B8"); bgGradient.addColorStop(1, "#D6C098");
            ctx.fillStyle = bgGradient; ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = textDark; ctx.lineWidth = 1; ctx.strokeRect(20, 20, w - 40, h - 40);

            // LOGO & HEADER
            ctx.beginPath(); ctx.roundRect(40, 40, 150, 60, 15); ctx.stroke();
            ctx.fillStyle = textDark; ctx.font = "bold 18px 'Georgia', serif"; ctx.textAlign = "center";
            ctx.fillText("Đăng Tùng", 115, 65); ctx.fillText("Photobooth", 115, 87);
            
            ctx.fillStyle = redColor; ctx.font = "bold 65px 'Georgia', serif"; ctx.textAlign = "left";
            ctx.fillText("LỄ HỘI ĐỀN ĐÔ", 230, 95);
            ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.moveTo(40, 125); ctx.lineTo(860, 125); ctx.stroke(); ctx.setLineDash([]);

            // ẢNH CHÍNH
            ctx.fillStyle = textDark; ctx.fillRect(38, 148, 484, 364); 
            ctx.drawImage(photoData[0], 40, 150, 480, 360);

            // BẢN TIN
            ctx.strokeStyle = textDark; ctx.lineWidth = 1; ctx.strokeRect(540, 150, 320, 560); ctx.strokeRect(545, 155, 310, 550); 
            ctx.fillStyle = "#2A402D"; ctx.font = "bold 38px 'Georgia', serif"; ctx.textAlign = "left";
            ctx.fillText("BẢN TIN", 565, 205);
            ctx.fillStyle = redColor; ctx.fillRect(730, 175, 45, 30); drawStar(ctx, 752.5, 190, 8, goldColor);

            ctx.fillStyle = textDark; ctx.font = "16px 'Georgia', serif"; ctx.textAlign = "left";
            const newsText = "Đến Đô hay còn gọi là (Đền Lý Bát Đế, Cổ Pháp Điện) được xây dựng vào thế kỷ XI, ngày nay nằm ở phường Đình Bảng, thành phố Từ Sơn. Đền được dựng trên nền đất mà khi xưa vua Lý Công Uẩn đăng quang và trở lại thăm quê hương. Theo sử sách, dân làng Đình Bảng đã cho xây dựng một ngôi nhà lớn làm nơi nghênh tiếp nhà vua. Khi vua Lý Công Uẩn băng hà, Lý Thái Tông lên ngôi kế vị vua cha, ông đã cho sửa sang lại ngôi nhà xưa và chọn làm nơi thờ tự vua cha, từ đó Đền trở thành nơi thờ tự các vị vua nhà Lý sau khi băng hà. Nhắc đến Bắc Ninh, người ta thường nghĩ đến những làn điệu Quan họ ngọt ngào, những làng nghề truyền thống văn hóa.";
            wrapText(ctx, newsText, 565, 240, 275, 25);
            drawTemple(ctx, 700, 680);

            // BANNER GIỮA
            ctx.fillStyle = textDark; ctx.font = "italic 14px 'Georgia', serif"; ctx.textAlign = "center";
            ctx.fillText("———— ĐĂNG TÙNG PHOTOBOOTH ————", 280, 535);
            ctx.strokeRect(40, 550, 480, 110);
            ctx.fillStyle = redColor; ctx.fillRect(45, 555, 50, 100);
            drawStar(ctx, 70, 580, 10, goldColor); drawStar(ctx, 70, 630, 10, goldColor);
            ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.moveTo(55, 605); ctx.lineTo(85, 605); ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle = redColor; ctx.font = "bold 32px 'Georgia', serif";
            ctx.fillText("TỰ HÀO LÀ NGƯỜI", 295, 595); ctx.fillText("VIỆT NAM", 295, 640);

            // 2 ẢNH NHỎ
            ctx.fillStyle = textDark; ctx.fillRect(38, 738, 404, 304); ctx.drawImage(photoData[1], 40, 740, 400, 300);
            ctx.fillRect(458, 738, 404, 304); ctx.drawImage(photoData[2], 460, 740, 400, 300);

            // CHÂN TRANG
            ctx.fillStyle = textDark; ctx.font = "bold 24px 'Georgia', serif"; ctx.textAlign = "center";
            ctx.fillText("Chào Mừng Đến Với Lễ Hội Đền Đô", w / 2, 1120);
            
            // Fake QR logic gọn
            ctx.fillStyle = "#fff"; ctx.fillRect(w - 100, 1070, 60, 60); ctx.fillStyle = "#000";
            for(let i=0; i<60; i++) ctx.fillRect(w - 96 + Math.random()*52, 1074 + Math.random()*52, 4, 4);
            ctx.fillRect(w-98, 1072, 14, 14); ctx.fillRect(w-46, 1072, 14, 14); ctx.fillRect(w-98, 1114, 14, 14);
        }

        // --- EVENTS ---
        captureBtn.addEventListener('click', startCaptureProcess);
        
        retakeBtn.addEventListener('click', () => {
            photoData = []; dots.forEach(d => d.classList.remove('active'));
            resultSection.style.display = 'none'; cameraSection.style.display = 'flex';
            captureBtn.disabled = false; captureBtn.innerHTML = `${iconCamera} Bấm Để Chụp (1/3)`;
            statusText.innerText = "Sẵn sàng! Hãy chuẩn bị pose dáng.";
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a'); link.download = `Dang-Tung-Photobooth-${Date.now()}.png`;
            link.href = resultCanvas.toDataURL('image/png', 1.0); link.click();
        });

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
