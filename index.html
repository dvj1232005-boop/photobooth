<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth Lễ Hội Đền Đô</title>
    <style>
        :root {
            --primary-red: #8b0000;
            --gold: #d4af37;
            --bg-dark: #1a1a1a;
        }
        
        body {
            margin: 0;
            padding: 20px 0;
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 {
            color: var(--gold); margin: 0; font-size: 32px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .app-container {
            display: flex; flex-direction: column; align-items: center;
            background: #2a2a2a; padding: 25px; border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid #444;
            max-width: 95vw;
        }

        .view-screen {
            position: relative;
            width: 680px; height: 510px;
            background: #000; border: 4px solid var(--gold); border-radius: 10px;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .view-screen { width: 100%; height: auto; aspect-ratio: 4/3; }
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        canvas#resultCanvas {
            display: none; max-width: 100%; height: auto;
            border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .controls { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        button {
            padding: 14px 28px; font-size: 18px; font-weight: bold; border: none;
            border-radius: 8px; cursor: pointer; transition: all 0.2s ease-in-out;
            text-transform: uppercase; font-family: inherit;
        }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #captureBtn { background-color: var(--primary-red); color: var(--gold); border: 2px solid var(--gold); }
        #captureBtn:hover:not(:disabled) { background-color: #a00000; transform: translateY(-2px); }

        #retakeBtn, #downloadBtn { display: none; }
        #retakeBtn { background-color: #444; color: white; border: 1px solid #666; }
        #downloadBtn { background-color: var(--gold); color: var(--primary-red); }

        .status { margin-top: 20px; font-size: 20px; color: var(--gold); font-weight: bold; text-align: center; }

        .photo-count { display: flex; gap: 10px; margin-bottom: 15px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #555; border: 2px solid var(--gold); }
        .dot.active { background: var(--primary-red); box-shadow: 0 0 10px var(--primary-red); }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 Photobooth Đền Đô</h1>
    </div>

    <div class="app-container">
        <div class="photo-count" id="photoIndicators">
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
        </div>

        <div class="view-screen">
            <video id="video" autoplay playsinline></video>
            <!-- Canvas chuẩn tỷ lệ 3:4 (900x1200) -->
            <canvas id="resultCanvas" width="900" height="1200"></canvas>
        </div>

        <div class="controls">
            <button id="captureBtn" disabled>Đang tải camera...</button>
            <button id="retakeBtn">🔄 Chụp lại</button>
            <button id="downloadBtn">📥 Lưu Ảnh</button>
        </div>
        
        <div class="status" id="statusText">Vui lòng cho phép truy cập Camera</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const resultCanvas = document.getElementById('resultCanvas');
        const ctx = resultCanvas.getContext('2d');
        
        const captureBtn = document.getElementById('captureBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusText = document.getElementById('statusText');
        const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

        let photoData = [];
        let stream = null;

        // Bật camera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                
                video.onplaying = () => {
                    captureBtn.disabled = false;
                    captureBtn.innerText = "Chụp Ảnh (1/3)";
                    statusText.innerText = "Sẵn sàng! Hãy tạo dáng thật đẹp";
                };
            } catch (err) {
                statusText.innerText = "Lỗi Camera. Hãy kiểm tra quyền truy cập!";
                statusText.style.color = "red";
            }
        }

        // Chụp ảnh
        function takePhoto() {
            const tempCanvas = document.createElement('canvas');
            const videoRatio = video.videoWidth / video.videoHeight;
            const targetRatio = 4/3;
            let sx = 0, sy = 0, sWidth = video.videoWidth, sHeight = video.videoHeight;

            if (videoRatio > targetRatio) {
                sWidth = sHeight * targetRatio;
                sx = (video.videoWidth - sWidth) / 2;
            }

            tempCanvas.width = 800; 
            tempCanvas.height = 600;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Lật gương
            tempCtx.translate(tempCanvas.width, 0);
            tempCtx.scale(-1, 1);
            
            // Cắt crop ảnh 4:3 từ camera
            tempCtx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, tempCanvas.width, tempCanvas.height);
            
            photoData.push(tempCanvas);
            updateDots();
            
            if (photoData.length < 3) {
                captureBtn.innerText = `Chụp Ảnh (${photoData.length + 1}/3)`;
                statusText.innerText = `Tuyệt! Chụp tiếp kiểu thứ ${photoData.length + 1} nào`;
            } else {
                generateFinalPoster();
            }
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < photoData.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        // --- HÀM TỰ ĐỘNG VẼ POSTER TRUYỀN THỐNG BẰNG CODE JS ---
        function drawRichBackground(context, width, height) {
            // 1. Nền Gradient giấy cổ hoàng gia
            let gradient = context.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, "#f4e3c5");
            gradient.addColorStop(0.5, "#e6ce9e");
            gradient.addColorStop(1, "#d1b373");
            context.fillStyle = gradient;
            context.fillRect(0, 0, width, height);

            // 2. Viền ngoài (Đỏ sẫm)
            context.lineWidth = 18;
            context.strokeStyle = "#7c0a02";
            context.strokeRect(15, 15, width - 30, height - 30);

            // 3. Viền trong (Vàng Gold)
            context.lineWidth = 4;
            context.strokeStyle = "#b58d3d";
            context.strokeRect(35, 35, width - 70, height - 70);

            // 4. Logo / Chữ Tiêu đề
            context.fillStyle = "#7c0a02";
            context.font = "bold 70px 'Times New Roman', serif";
            context.textAlign = "center";
            context.fillText("LỄ HỘI ĐỀN ĐÔ", width / 2, 130);
            
            context.font = "italic 24px 'Times New Roman', serif";
            context.fillStyle = "#553a1f";
            context.fillText("Di tích Quốc gia đặc biệt - Từ Sơn, Bắc Ninh", width / 2, 175);

            // 5. Tiêu đề nhỏ (Photobooth) góc trái
            context.fillStyle = "#b58d3d";
            context.fillRect(45, 45, 120, 35);
            context.fillStyle = "#7c0a02";
            context.font = "bold 16px Arial";
            context.fillText("PHOTOBOOTH", 105, 68);

            // 6. Khu vực Text giữa
            context.fillStyle = "#7c0a02";
            context.font = "bold 45px 'Times New Roman', serif";
            context.fillText("TỰ HÀO LÀ NGƯỜI VIỆT NAM", width / 2, 790);

            // 7. Chân trang
            context.fillStyle = "#7c0a02";
            context.font = "bold 32px 'Times New Roman', serif";
            context.fillText("BẢN TIN 🇻🇳", width / 2, 1140);
        }

        // Vẽ ảnh người dùng vào khung có viền 3D
        function drawFramedPhoto(context, img, x, y, w, h) {
            // Đổ bóng (Shadow)
            context.shadowColor = "rgba(0,0,0,0.5)";
            context.shadowBlur = 15;
            context.shadowOffsetX = 5;
            context.shadowOffsetY = 5;

            // Viền ngoài (Màu đỏ sẫm)
            context.fillStyle = "#7c0a02";
            context.fillRect(x - 10, y - 10, w + 20, h + 20);
            
            // Tắt shadow cho các lớp bên trong
            context.shadowColor = "transparent";

            // Viền trong (Màu vàng kim)
            context.fillStyle = "#d4af37";
            context.fillRect(x - 4, y - 4, w + 8, h + 8);

            // Vẽ ảnh thật
            context.drawImage(img, x, y, w, h);
        }

        // Render toàn bộ
        function generateFinalPoster() {
            video.style.display = 'none';
            resultCanvas.style.display = 'block';
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-block';
            downloadBtn.style.display = 'inline-block';
            statusText.innerText = "Hoàn thành! Bạn có thể tải ảnh về 🇻🇳";

            // 1. Vẽ nền trang trí
            drawRichBackground(ctx, resultCanvas.width, resultCanvas.height);

            // 2. Vẽ 3 bức ảnh đè lên trên nền (Có khung viền bao quanh)
            drawFramedPhoto(ctx, photoData[0], 115, 230, 670, 500); // Ảnh 1 (Main)
            drawFramedPhoto(ctx, photoData[1], 115, 830, 315, 235); // Ảnh 2 (Sub 1)
            drawFramedPhoto(ctx, photoData[2], 470, 830, 315, 235); // Ảnh 3 (Sub 2)
        }

        captureBtn.addEventListener('click', takePhoto);

        retakeBtn.addEventListener('click', () => {
            photoData = [];
            updateDots();
            video.style.display = 'block';
            resultCanvas.style.display = 'none';
            captureBtn.style.display = 'inline-block';
            retakeBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
            captureBtn.innerText = 'Chụp Ảnh (1/3)';
            statusText.innerText = "Sẵn sàng! Hãy tạo dáng thật đẹp";
        });

        downloadBtn.addEventListener('click', () => {
            const dateStr = new Date().toISOString().replace(/[:.]/g, '-');
            const link = document.createElement('a');
            link.download = `Photobooth-DenDo-${dateStr}.png`;
            link.href = resultCanvas.toDataURL('image/png', 1.0); 
            link.click();
        });

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
